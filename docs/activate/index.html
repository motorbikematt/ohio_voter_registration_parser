<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activate Account | Precinct Captain</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-slate-200">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-slate-800 mb-2">Activate Account</h1>
      <p class="text-slate-500" id="subtitle">Set your password to access the canvassing dashboard.</p>
    </div>

    <form id="activateForm" class="space-y-6">
      <input type="hidden" id="v_id" name="v_id">
      
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2" id="phoneLabel">
          Last 4 Digits of Phone Number (PIN)
        </label>
        <input 
          type="text" 
          id="pin" 
          name="pin"
          class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-lg tracking-widest text-center font-bold"
          placeholder="••••"
          required
        >
        <p class="text-xs text-slate-500 mt-2 text-center" id="phoneHelpText">
          Enter the PIN you used to check in at the meeting.
        </p>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">New Password</label>
        <input 
          type="password" 
          id="password" 
          name="password"
          class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
          placeholder="••••••••"
          required
          minlength="8"
        >
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Confirm Password</label>
        <input 
          type="password" 
          id="confirmPassword" 
          class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
          placeholder="••••••••"
          required
          minlength="8"
        >
      </div>

      <div id="errorMessage" class="hidden bg-red-50 text-red-600 px-4 py-3 rounded-lg text-sm font-medium border border-red-200">
      </div>
      
      <div id="successMessage" class="hidden bg-emerald-50 text-emerald-700 px-4 py-3 rounded-lg text-sm font-medium border border-emerald-200">
        Account activated successfully! Redirecting...
      </div>

      <button 
        type="submit" 
        id="submitBtn"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl transition-colors shadow-sm active:scale-[0.98] flex justify-center items-center"
      >
        <span>Activate Account</span>
      </button>
    </form>
  </div>

  <script src="./activate.js"></script>
</body>
</html>
