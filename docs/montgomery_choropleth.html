<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montgomery County Spatial Choropleth</title>
    <link rel="stylesheet" href="assets/v2-tokens.css" />
    <link rel="stylesheet" href="assets/v2.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-body, #0f172a);
            color: var(--fg-default, #f8fafc);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .header {
            padding: 16px 24px;
            background-color: var(--bg-surface, #1e293b);
            border-bottom: 1px solid var(--border-default, #334155);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .controls {
            display: flex;
            gap: 16px;
        }
        .controls label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            padding: 6px 12px;
            background: var(--bg-button, #334155);
            border-radius: 4px;
            border: 1px solid var(--border-default, #475569);
        }
        #map-container {
            flex: 1;
            width: 100%;
            z-index: 1;
        }
        /* Leaflet popup dark mode override */
        .leaflet-popup-content-wrapper {
            background-color: var(--bg-surface, #1e293b);
            color: var(--fg-default, #f8fafc);
            border: 1px solid var(--border-default, #334155);
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }
        .leaflet-popup-tip {
            background-color: var(--bg-surface, #1e293b);
            border: 1px solid var(--border-default, #334155);
        }
        .popup-title {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border-default, #334155);
            padding-bottom: 4px;
        }
        .popup-stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            gap: 24px;
            font-size: 0.95rem;
        }
        /* Legend block to explain the styling */
        .map-legend-custom {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: var(--bg-surface, #1e293b);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-default, #334155);
            z-index: 1000;
            font-size: 0.9rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Montgomery County Spatial Choropleth (Partisan Lean)</h1>
        <div class="controls">
            <label>
                <input type="checkbox" id="toggle-precincts" checked> Show Precincts (Blue)
            </label>
            <label>
                <input type="checkbox" id="toggle-wards" checked> Show Wards
            </label>
            <label>
                <input type="checkbox" id="toggle-house"> Show House
            </label>
            <label>
                <input type="checkbox" id="toggle-senate"> Show Senate
            </label>
            <label>
                <input type="checkbox" id="toggle-congress"> Show Congress
            </label>
        </div>
    </div>
    
    <div id="map-container">
        <div class="map-legend-custom">
            <div class="legend-item">
                <div class="legend-color" style="background: #2563eb;"></div>
                <span>Majority Democrat</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #ef4444;"></div>
                <span>Majority Republican</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #9ca3af;"></div>
                <span>Tie</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="border-top: 3px dashed #eab308; width: 16px; height: 0; background: transparent;"></div>
                <span>Wards</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="border-top: 3px dashed #10b981; width: 16px; height: 0; background: transparent;"></div>
                <span>House</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="border-top: 3px dashed #f43f5e; width: 16px; height: 0; background: transparent;"></div>
                <span>Senate</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="border-top: 3px dashed #8b5cf6; width: 16px; height: 0; background: transparent;"></div>
                <span>Congress</span>
            </div>
        </div>
    </div>

    <script>
        const map = L.map('map-container').setView([39.75, -84.25], 11);

        // Dark mode basemap from CARTO
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        let precinctsLayer;
        let wardsLayer;
        let houseLayer;
        let senateLayer;
        let congressLayer;

        function createPopupContent(title, props) {
            const total = props.TOTAL_VOTERS || 0;
            const dem = props.DEM_VOTERS || 0;
            const rep = props.REP_VOTERS || 0;
            const una = props.UNA_VOTERS || 0;
            
            return `
                <div class="popup-title">${title}</div>
                <div class="popup-stat"><span>Total Voters:</span> <strong>${total.toLocaleString()}</strong></div>
                <div class="popup-stat"><span>Democrats:</span> <strong style="color: #60a5fa">${dem.toLocaleString()}</strong></div>
                <div class="popup-stat"><span>Republicans:</span> <strong style="color: #f87171">${rep.toLocaleString()}</strong></div>
                <div class="popup-stat"><span>Unaffiliated:</span> <strong style="color: #9ca3af">${una.toLocaleString()}</strong></div>
            `;
        }

        // Load Precincts
        fetch('data/montgomery_precincts.geojson')
            .then(res => res.json())
            .then(data => {
                precinctsLayer = L.geoJSON(data, {
                    style: (feature) => {
                        const dem = feature.properties.DEM_VOTERS || 0;
                        const rep = feature.properties.REP_VOTERS || 0;
                        
                        let fillColor = '#9ca3af'; // Tie
                        if (dem > rep) fillColor = '#2563eb'; // Pure D
                        else if (rep > dem) fillColor = '#ef4444'; // Pure R
                        
                        return {
                            color: '#0f172a', // very dark border to see edges cleanly
                            weight: 1,
                            opacity: 0.8,
                            fillColor: fillColor,
                            fillOpacity: 0.7
                        };
                    },
                    onEachFeature: (feature, layer) => {
                        const props = feature.properties;
                        layer.bindPopup(createPopupContent(props.VNAME || 'Unknown Precinct', props));
                        
                        layer.on({
                            mouseover: (e) => {
                                const l = e.target;
                                l.setStyle({ fillOpacity: 0.4, weight: 2 });
                            },
                            mouseout: (e) => {
                                precinctsLayer.resetStyle(e.target);
                            }
                        });
                    }
                }).addTo(map);
                
                // Adjust bounds to fit data once loaded
                map.fitBounds(precinctsLayer.getBounds());
            })
            .catch(err => console.error("Error loading precincts:", err));

        // Helper to load overlays
        function loadOverlayLayer(url, color, dashArray, varName, titleCol) {
            fetch(url)
                .then(res => res.json())
                .then(data => {
                    const layer = L.geoJSON(data, {
                        style: (feature) => {
                            const dem = feature.properties.DEM_VOTERS || 0;
                            const rep = feature.properties.REP_VOTERS || 0;
                            const total = feature.properties.TOTAL_VOTERS || 0;
                            
                            let fillColor = 'transparent';
                            let fillOpacity = 0.0;
                            
                            // Only apply choropleth if there are voters (solves the 0 problem)
                            if (total > 0) {
                                fillOpacity = 0.5; // Slightly transparent to let precincts show through if stacked
                                fillColor = '#9ca3af'; // Tie
                                if (dem > rep) fillColor = '#2563eb'; // Pure D
                                else if (rep > dem) fillColor = '#ef4444'; // Pure R
                            }
                            
                            return {
                                color: color, // Keep the distinct dashed border color
                                weight: 3,
                                opacity: 1,
                                dashArray: dashArray,
                                fillColor: fillColor,
                                fillOpacity: fillOpacity
                            };
                        },
                        onEachFeature: (feature, l) => {
                            const props = feature.properties;
                            l.bindPopup(createPopupContent(props[titleCol] || 'Unknown', props));
                        }
                    });
                    
                    if (varName === 'wards') wardsLayer = layer;
                    if (varName === 'house') houseLayer = layer;
                    if (varName === 'senate') senateLayer = layer;
                    if (varName === 'congress') congressLayer = layer;
                    
                    // Wards checked by default
                    if (varName === 'wards') {
                        layer.addTo(map);
                        layer.bringToFront();
                    }
                })
                .catch(err => console.error("Error loading " + varName + ":", err));
        }

        loadOverlayLayer('data/montgomery_wards.geojson', '#eab308', '5, 5', 'wards', 'DESCRIPTIO');
        loadOverlayLayer('data/montgomery_house.geojson', '#10b981', '8, 4', 'house', 'DESCRIPTIO');
        loadOverlayLayer('data/montgomery_senate.geojson', '#f43f5e', '10, 5', 'senate', 'DESCRIPTIO');
        loadOverlayLayer('data/montgomery_congress.geojson', '#8b5cf6', '12, 6', 'congress', 'DESRIPTION');

        // Toggle logic
        document.getElementById('toggle-precincts').addEventListener('change', function() {
            if (this.checked && precinctsLayer) {
                map.addLayer(precinctsLayer);
                if (wardsLayer && map.hasLayer(wardsLayer)) wardsLayer.bringToFront();
                if (houseLayer && map.hasLayer(houseLayer)) houseLayer.bringToFront();
                if (senateLayer && map.hasLayer(senateLayer)) senateLayer.bringToFront();
                if (congressLayer && map.hasLayer(congressLayer)) congressLayer.bringToFront();
            } else if (precinctsLayer) {
                map.removeLayer(precinctsLayer);
            }
        });

        function toggleLayer(checkboxId, getLayer) {
            document.getElementById(checkboxId).addEventListener('change', function() {
                const layer = getLayer();
                if (!layer) return;
                if (this.checked) {
                    map.addLayer(layer);
                    layer.bringToFront();
                } else {
                    map.removeLayer(layer);
                }
            });
        }

        toggleLayer('toggle-wards', () => wardsLayer);
        toggleLayer('toggle-house', () => houseLayer);
        toggleLayer('toggle-senate', () => senateLayer);
        toggleLayer('toggle-congress', () => congressLayer);
    </script>
</body>
</html>
